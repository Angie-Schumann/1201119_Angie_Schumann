# =============================================================
# NGINX.CONF - Configuracion del servidor web para Vue.js
# Vue es una SPA (Single Page Application): todas las rutas
# deben apuntar al index.html para que Vue Router las maneje.
# Sin esta configuracion, al recargar /citas daria error 404.
# =============================================================

server {
    # Nginx escucha en el puerto 80
    listen 80;
    
    # Directorio raiz donde estan los archivos compilados de Vue
    root /usr/share/nginx/html;
    
    # Archivo por defecto a servir
    index index.html;

    # Configuracion principal: SPA routing
    # try_files intenta servir el archivo solicitado,
    # si no existe devuelve index.html (Vue Router maneja el resto)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para archivos estaticos (JS, CSS, imagenes)
    # Mejora el rendimiento: el navegador los guarda localmente
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Seguridad: cabeceras HTTP recomendadas
    add_header X-Frame-Options "SAMEORIGIN";           # Evita clickjacking
    add_header X-Content-Type-Options "nosniff";       # Evita MIME sniffing
    add_header X-XSS-Protection "1; mode=block";       # Proteccion XSS basica
}
