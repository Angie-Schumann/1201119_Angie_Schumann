# =============================================================
# MONGO-SECRET.YML - Credenciales seguras para MongoDB
#
# En Kubernetes, un "Secret" es un objeto especial que guarda
# informacion sensible (contrasenas, tokens) de forma codificada.
# Es el equivalente al archivo .env que usamos en Docker.
#
# IMPORTANTE: Los valores deben estar en base64.
# Para codificar en base64 en PowerShell:
#   [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("tu-valor"))
#
# admin        en base64 = YWRtaW4=
# MediPass2026Secure! en base64 = TWVkaVBhc3MyMDI2U2VjdXJlIQ==
# =============================================================

apiVersion: v1          # Version de la API de Kubernetes que maneja Secrets
kind: Secret            # Tipo de objeto: Secret (guarda datos sensibles)
metadata:
  name: mongo-secret    # Nombre del Secret, los otros archivos lo referencian por este nombre
type: Opaque            # Tipo Opaque = datos genericos (no es un certificado ni token especial)

data:
  # Usuario de MongoDB codificado en base64
  # "admin" -> base64 -> "YWRtaW4="
  mongo-user: YWRtaW4=

  # Contrasena de MongoDB codificada en base64
  # "MediPass2026Secure!" -> base64 -> "TWVkaVBhc3MyMDI2U2VjdXJlIQ=="
  mongo-password: TWVkaVBhc3MyMDI2U2VjdXJlIQ==

  # URI completa de conexion que usara Flask, codificada en base64
  # "mongodb://admin:MediPass2026Secure!@mongo-service:27017/medicamentos_db?authSource=admin"
  mongo-uri: bW9uZ29kYjovL2FkbWluOk1lZGlQYXNzMjAyNlNlY3VyZSFAbW9uZ28tc2VydmljZToyNzAxNy9tZWRpY2FtZW50b3NfZGI/YXV0aFNvdXJjZT1hZG1pbg==
